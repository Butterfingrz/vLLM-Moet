# "rtx" box, PRO 6000 group: 4x RTX PRO 6000 Blackwell Workstation 96 GB
# (GPUs 0-3 of an 8-GPU host that also carries 4x RTX 5090 — those are
# bench/boxes/rtx-5090x4.yaml; pass --gpus with HOST indices to pin a group).
# Multi-GPU NCCL works WITHOUT NCCL_P2P_DISABLE on this host (the standing
# GLM PP2 demo runs flagless).

id: rtx-pro6000x4
gpus:
  name: "RTX PRO 6000 Blackwell Workstation"
  count: 4
  vram_gb: 96
host_ram_gb: 1007

runtime: docker
docker_image: vllm-moet-recipes:v024
shm_size: 64g

env:
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

models:
  GLM-5.2-NVFP4: /workspace/glm-5.2-nvfp4
  DeepSeek-V4-Flash: /workspace/ds4flash-official

planes_cache:
  GLM-5.2-NVFP4: /workspace/.planes-cache-glm-bench

log_dir: /root/logs/bench
