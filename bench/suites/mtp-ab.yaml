# Scratch A/B suite for the MTP-k comparison (glm quality config, k=2/5/7).
# No allow_recipe_overrides: every variant gets IDENTICAL probe params.
# decode + acceptance is the point; needle 100k words sanity-checks the 128K
# window still serves under the bigger verify graphs.

id: mtp-ab
probes:
  - kind: decode
    runs: 7
    max_tokens: 512
  - kind: batch_decode
    concurrency: [1, 4]
    max_tokens: 384
    runs: 3
  - kind: needle
    sizes_words: [88000]
    depth: 0.5
    max_tokens: 512
  - kind: arithmetic
  - kind: coherence
