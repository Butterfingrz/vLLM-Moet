# A/B suite for recipe variants: no allow_recipe_overrides, so every
# variant gets identical probe params.

id: mtp-ab
probes:
  - kind: decode
    runs: 7
    max_tokens: 512
  - kind: batch_decode
    concurrency: [1, 4]
    max_tokens: 384
    runs: 3
  - kind: needle
    sizes_words: [88000]
    depth: 0.5
    max_tokens: 512
  - kind: arithmetic
  - kind: coherence
