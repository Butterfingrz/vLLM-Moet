id: standard
allow_recipe_overrides: true
probes:
  - kind: decode
    runs: 5
    max_tokens: 512
  - kind: batch_decode
    concurrency: [1, 4, 8, 16, 32]
    max_tokens: 384
    runs: 3
  - kind: prefill
    words: 8000
    runs: 3
  - kind: needle
    sizes_frac: [0.03, 0.25, 0.5, 0.95]
    depth: 0.5
    max_tokens: 512
  - kind: arithmetic
  - kind: coherence
